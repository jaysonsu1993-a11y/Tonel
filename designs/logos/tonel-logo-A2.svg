<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#131212"/>
  <!-- T letterform using triangular geometry -->
  <polygon points="100,100 256,80 412,100 412,140 300,140 256,190 212,140 100,140" fill="#E8E8E8"/>
  <!-- Stem of T -->
  <rect x="226" y="190" width="60" height="220" fill="#E8E8E8"/>
  <!-- Geometric circle at bottom -->
  <circle cx="256" cy="460" r="30" fill="#131212" stroke="#E8E8E8" stroke-width="6"/>
  <!-- Small triangle accent -->
  <polygon points="256,400 236,430 276,430" fill="#E8E8E8"/>
</svg>
