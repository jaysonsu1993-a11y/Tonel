<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#131212"/>
  <!-- Audio waveform as T shape - horizontal sound waves -->
  <path d="M 60 200 Q 100 180 140 200 Q 180 220 220 200 Q 260 180 300 200" fill="none" stroke="#E8E8E8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 80 240 Q 120 220 160 240 Q 200 260 240 240 Q 280 220 320 240" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
  <!-- T stem as waveform -->
  <path d="M 280 200 Q 300 240 280 280 Q 260 320 280 360 Q 300 400 280 440" fill="none" stroke="#E8E8E8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 300 200 Q 320 240 300 280 Q 280 320 300 360 Q 320 400 300 440" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
  <!-- Bottom accent waves -->
  <path d="M 200 400 Q 240 420 280 400 Q 320 380 360 400" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <!-- Geometric frame corners -->
  <rect x="60" y="60" width="24" height="4" fill="#E8E8E8"/>
  <rect x="60" y="60" width="4" height="24" fill="#E8E8E8"/>
  <rect x="428" y="60" width="24" height="4" fill="#E8E8E8"/>
  <rect x="448" y="60" width="4" height="24" fill="#E8E8E8"/>
  <rect x="60" y="448" width="24" height="4" fill="#E8E8E8"/>
  <rect x="60" y="428" width="4" height="24" fill="#E8E8E8"/>
  <rect x="428" y="448" width="24" height="4" fill="#E8E8E8"/>
  <rect x="448" y="428" width="4" height="24" fill="#E8E8E8"/>
</svg>
