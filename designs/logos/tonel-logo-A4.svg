<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#131212"/>
  <!-- Interlocking squares forming T -->
  <rect x="136" y="80" width="120" height="120" fill="none" stroke="#E8E8E8" stroke-width="8"/>
  <rect x="176" y="80" width="120" height="120" fill="none" stroke="#E8E8E8" stroke-width="8"/>
  <rect x="216" y="80" width="120" height="120" fill="none" stroke="#E8E8E8" stroke-width="8"/>
  <!-- Overlapping T stem -->
  <rect x="246" y="120" width="60" height="280" fill="#E8E8E8"/>
  <!-- Cutouts to show depth -->
  <rect x="136" y="200" width="120" height="120" fill="#131212"/>
  <rect x="216" y="280" width="120" height="120" fill="#131212"/>
  <!-- Bottom geometric accent -->
  <circle cx="256" cy="440" r="24" fill="#E8E8E8"/>
  <circle cx="256" cy="440" r="12" fill="#131212"/>
</svg>
