<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#131212"/>
  <!-- Circular waveform rings representing connection -->
  <circle cx="180" cy="256" r="100" fill="none" stroke="#E8E8E8" stroke-width="3"/>
  <circle cx="180" cy="256" r="75" fill="none" stroke="#888" stroke-width="2"/>
  <circle cx="180" cy="256" r="50" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="180" cy="256" r="25" fill="#E8E8E8"/>
  <!-- Second ring cluster -->
  <circle cx="332" cy="256" r="100" fill="none" stroke="#E8E8E8" stroke-width="3"/>
  <circle cx="332" cy="256" r="75" fill="none" stroke="#888" stroke-width="2"/>
  <circle cx="332" cy="256" r="50" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="332" cy="256" r="25" fill="#E8E8E8"/>
  <!-- Connection wave between them -->
  <path d="M 230 256 Q 256 200 280 256 Q 256 312 230 256" fill="none" stroke="#E8E8E8" stroke-width="4"/>
  <!-- T letterform overlay -->
  <rect x="226" y="96" width="60" height="16" fill="#E8E8E8"/>
  <rect x="246" y="112" width="20" height="288" fill="#E8E8E8"/>
  <rect x="246" y="376" width="20" height="20" fill="#131212"/>
</svg>
