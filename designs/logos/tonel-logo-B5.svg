<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#131212"/>
  <!-- Pulsing circles representing real-time audio connection -->
  <circle cx="256" cy="200" r="60" fill="none" stroke="#E8E8E8" stroke-width="4"/>
  <circle cx="256" cy="200" r="40" fill="none" stroke="#888" stroke-width="3"/>
  <circle cx="256" cy="200" r="20" fill="#E8E8E8"/>
  <!-- Radiating lines from center -->
  <line x1="256" y1="100" x2="256" y2="140" stroke="#E8E8E8" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="256" y2="300" stroke="#E8E8E8" stroke-width="4" stroke-linecap="round"/>
  <line x1="176" y1="200" x2="216" y2="200" stroke="#E8E8E8" stroke-width="4" stroke-linecap="round"/>
  <line x1="296" y1="200" x2="336" y2="200" stroke="#E8E8E8" stroke-width="4" stroke-linecap="round"/>
  <!-- T stem below as vertical waveform -->
  <path d="M 236 280 L 236 340 Q 236 380 256 380 Q 276 380 276 340 L 276 280" fill="none" stroke="#E8E8E8" stroke-width="4"/>
  <path d="M 246 290 L 246 330 Q 246 360 256 360 Q 266 360 266 330 L 266 290" fill="none" stroke="#888" stroke-width="3"/>
  <!-- Sound wave arcs at bottom -->
  <path d="M 180 420 Q 200 440 220 420" fill="none" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>
  <path d="M 230 420 Q 256 450 282 420" fill="none" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>
  <path d="M 290 420 Q 310 440 330 420" fill="none" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal accent lines -->
  <line x1="140" y1="140" x2="180" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="372" y1="140" x2="332" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="140" y1="260" x2="180" y2="220" stroke="#555" stroke-width="2"/>
  <line x1="372" y1="260" x2="332" y2="220" stroke="#555" stroke-width="2"/>
</svg>
