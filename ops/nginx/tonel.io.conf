# tonel.io / api.tonel.io — main site + signaling/mixer WS proxy.
#
# DNS:
#   tonel.io      → CNAME tonel-web.pages.dev (orange cloud, CF Pages)
#   api.tonel.io  → CNAME <tunnel-id>.cfargotunnel.com (orange cloud, CF Tunnel)
#
# Note: tonel.io is served by Cloudflare Pages, NOT this nginx.
# This nginx block exists because the server-side cloudflared tunnel terminates
# at api.tonel.io and forwards WS upgrades through here. The `root /var/www/tonel-web`
# block is a legacy fallback used only when traffic hits the origin directly.

server {
    server_name tonel.io api.tonel.io www.tonel.io;
    root /var/www/tonel-web;
    index index.html;

    # HSTS — once a client has hit the site over HTTPS, they will refuse
    # plain-HTTP for 6 months. `includeSubDomains` also covers api.tonel.io
    # and srv.tonel.io. `preload` makes the domain eligible for the
    # https://hstspreload.org/ list so even first visits skip the HTTP step.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;

    # www.tonel.io → tonel.io (preserve path + query). Most CF traffic never
    # touches this nginx, but the redirect is here as the direct-origin
    # fallback so behavior matches whatever Cloudflare is configured to do
    # at the edge.
    if ($host = www.tonel.io) {
        return 301 https://tonel.io$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }

    # Signaling WS — ws-proxy on :9004 (also bridges /mixer-tcp + /mixer-udp internally)
    location /signaling {
        proxy_pass http://127.0.0.1:9004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Mixer TCP control — ws-mixer-proxy on :9005
    location /mixer-tcp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Mixer UDP relay — ws-mixer-proxy on :9005
    location /mixer-udp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/tonel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tonel.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = tonel.io) {
        return 301 https://$host$request_uri;
    }
    if ($host = www.tonel.io) {
        return 301 https://tonel.io$request_uri;
    }
    listen 80;
    server_name tonel.io api.tonel.io www.tonel.io;
    return 404;
}
