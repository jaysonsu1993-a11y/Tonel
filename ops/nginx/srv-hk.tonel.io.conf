# srv-hk.tonel.io — HK staging mixer entry (v5.1.22+, `/hk` path traffic).
#
# DNS: A record → 38.76.186.215 (cognetcloud HK, grey cloud / DNS only,
# NOT proxied by Cloudflare). Mirror of srv.tonel.io.conf with a
# different server_name + cert lineage so the HK box can be validated
# under `/hk` BEFORE flipping the main `srv.tonel.io` DNS to it.
#
# Once `srv.tonel.io` DNS is flipped to HK and `/` traffic lives here,
# this file becomes redundant — keep it for a release or two as the
# rollback target, then remove.

server {
    listen 443 ssl;
    server_name srv-hk.tonel.io;

    # SAN cert lineage `srv.tonel.io` covers both srv.tonel.io and
    # srv-hk.tonel.io (signed v5.1.22). Same lineage as the main
    # production cert so a single certbot renewal updates both.
    ssl_certificate     /etc/letsencrypt/live/srv.tonel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv.tonel.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CRITICAL: binary WebSocket frames must not be buffered/truncated.
    proxy_buffering off;
    proxy_request_buffering off;

    location /mixer-tcp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /mixer-udp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 80;
    server_name srv-hk.tonel.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
