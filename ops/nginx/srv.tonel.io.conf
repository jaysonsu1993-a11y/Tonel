# srv.tonel.io — primary mixer entry (v5.0.0+, default `/` traffic).
#
# DNS: A record → 42.240.163.172 (酷番云广州, grey cloud / DNS only,
# NOT proxied by Cloudflare). The DNS-only bypass is intentional —
# audio traffic must not traverse CF for latency reasons. See
# docs/ARCHITECTURE.md "Architecture decisions" §10.
#
# v5 production server's nginx ALSO serves srv-new.tonel.io (the
# Aliyun fallback hostname) on the same listen :443, behind a
# different server_name. This is to keep config symmetric across
# both prod boxes — the same ops/ deploys to either, DNS picks
# which one the user actually hits. See ops/nginx/srv-new.tonel.io.conf.

server {
    listen 443 ssl;
    server_name srv.tonel.io;

    ssl_certificate     /etc/letsencrypt/live/srv.tonel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv.tonel.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CRITICAL: binary WebSocket frames must not be buffered/truncated.
    proxy_buffering off;
    proxy_request_buffering off;

    location /mixer-tcp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /mixer-udp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 80;
    server_name srv.tonel.io;
    return 301 https://$host$request_uri;
}
