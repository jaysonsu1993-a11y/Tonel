# api-hk.tonel.io — HK signaling endpoint (v5.1.25+, `/hk` path).
#
# DNS: A record → 38.76.186.215 (cognetcloud HK, grey cloud / DNS only).
# Mirror of the /signaling block in tonel.io.conf, but served directly
# by nginx on the HK box (no Cloudflare Tunnel) since HK doesn't run
# cloudflared — the box exposes 80/443 directly.
#
# Cert: shared `srv.tonel.io` SAN cert (also covers srv-hk + api-hk
# after v5.1.25 cert --expand).

server {
    listen 443 ssl;
    server_name api-hk.tonel.io;

    ssl_certificate     /etc/letsencrypt/live/srv.tonel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv.tonel.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CRITICAL: WS frames must not be buffered/truncated (matches the
    # Aliyun/kufan tunnel's pass-through semantics).
    proxy_buffering off;
    proxy_request_buffering off;

    # Signaling WS — ws-proxy on :9004 bridges to TCP signaling :9001
    location /signaling {
        proxy_pass http://127.0.0.1:9004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 80;
    server_name api-hk.tonel.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
