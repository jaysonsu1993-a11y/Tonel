<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tonel — Homepage</title>
<link rel="stylesheet" href="tonel-tokens.css">
<link rel="stylesheet" href="variations.css">
<link rel="stylesheet" href="v1.css">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #e8e8e8; font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }
  .home-frame { width: 1440px; min-height: 900px; background: #000; overflow: hidden; }
  .home-frame .tn-nav { position: relative; }

  /* iPhone shell */
  .iphone-shell {
    width: 402px; height: 874px;
    background: #000;
    border-radius: 54px;
    border: 10px solid #1a1a1a;
    box-shadow: 0 0 0 2px #2a2a2a, 0 30px 80px rgba(0,0,0,.6);
    overflow: hidden;
    position: relative;
  }
  .iphone-screen {
    width: 100%; height: 100%;
    overflow-y: auto; overflow-x: hidden;
    background: #000;
    -webkit-overflow-scrolling: touch;
  }
  .iphone-status {
    position: absolute; top: 0; left: 0; right: 0; height: 50px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    font-family: var(--font-sans); font-size: 15px; font-weight: 600;
    color: #fff; pointer-events: none; z-index: 100;
  }
  .iphone-status .right { display: flex; gap: 6px; align-items: center; }
  .iphone-status .icon {
    display: inline-block; width: 14px; height: 10px; border: 1.5px solid #fff; border-radius: 2px;
    position: relative;
  }
  .iphone-status .icon::after { content: ""; position: absolute; right: -3px; top: 2px; width: 1.5px; height: 4px; background: #fff; border-radius: 1px; }
  .iphone-status .icon::before { content: ""; position: absolute; inset: 1px; background: #fff; border-radius: 1px; }
  .iphone-notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 35px;
    background: #000; border-radius: 20px;
    z-index: 99;
  }
  .iphone-screen-content {
    padding-top: 50px;
    min-height: 100%;
  }
  .iphone-home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: #fff; border-radius: 3px;
    z-index: 100; opacity: .9;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function IPhone({ children }) {
  return (
    <div className="iphone-shell">
      <div className="iphone-notch" />
      <div className="iphone-status">
        <span>9:41</span>
        <span className="right">
          <span style={{ fontSize: 11, letterSpacing: 1 }}>5G</span>
          <span className="icon" />
        </span>
      </div>
      <div className="iphone-screen">
        <div className="iphone-screen-content">{children}</div>
      </div>
      <div className="iphone-home-indicator" />
    </div>
  );
}

function App() {
  return (
    <DesignCanvas title="Tonel — Homepage" subtitle="V1 · 12ms hero — desktop + mobile">
      <DCSection id="desktop" title="Desktop · 1440">
        <DCArtboard id="v1-desktop" label="V1 · Desktop 1440" width={1440} height={900}>
          <div className="home-frame" data-screen-label="V1 desktop">
            <NavBar />
            <V1Desktop />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile · iPhone (390 × 844)">
        <DCArtboard id="v1-mobile-collapsed" label="V1 · Mobile (顶部) " width={460} height={920}>
          <IPhone><V1Mobile /></IPhone>
        </DCArtboard>
        <DCArtboard id="v1-mobile-flat" label="V1 · Mobile · 完整布局（无设备框）" width={420} height={1280}>
          <div style={{ width: 390, margin: "0 auto", background: "#000", minHeight: 1240, overflow: "hidden", borderRadius: 8 }}>
            <V1Mobile />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
