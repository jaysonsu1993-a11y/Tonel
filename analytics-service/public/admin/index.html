<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tonel · Analytics Dashboard</title>
<link rel="icon" href="data:," />
<style>
:root {
  --bg: #0b0e14;
  --panel: #11151d;
  --panel-2: #161b25;
  --border: #1f2632;
  --text: #e6edf3;
  --text-dim: #8b95a7;
  --accent: #5eead4;
  --accent-2: #818cf8;
  --warn: #f59e0b;
  --danger: #ef4444;
  --good: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Helvetica Neue", Arial, sans-serif; }
a { color: var(--accent); text-decoration: none; }
button { font: inherit; cursor: pointer; }

/* ── Layout ─────────────────────────────────────────────────────────────── */
.app { min-height: 100vh; display: flex; flex-direction: column; }
header.top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
.brand .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
}
.brand .sub { color: var(--text-dim); font-weight: 400; font-size: 13px; }
.controls { display: flex; gap: 8px; align-items: center; }
.range-btn {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px;
  font-size: 13px;
}
.range-btn.active { color: var(--text); border-color: var(--accent); background: rgba(94,234,212,.08); }
.refresh-btn {
  background: var(--accent); color: #051218; border: none;
  padding: 6px 14px; border-radius: 6px; font-weight: 600; font-size: 13px;
}
.logout-btn {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px;
  font-size: 13px;
}

main { padding: 20px 24px; display: grid; gap: 16px; }

/* KPI cards */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.kpi {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
}
.kpi .label { color: var(--text-dim); font-size: 12px;
  text-transform: uppercase; letter-spacing: .5px; }
.kpi .value { font-size: 28px; font-weight: 600; margin-top: 4px;
  font-variant-numeric: tabular-nums; }
.kpi .delta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* Panels */
.row { display: grid; gap: 16px; }
.row.two { grid-template-columns: 2fr 1fr; }
.row.three { grid-template-columns: 1fr 1fr 1fr; }
.panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.panel h2 {
  font-size: 13px; font-weight: 600; color: var(--text);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
}
.panel h2 .hint { color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 12px; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: var(--text-dim); font-weight: 500;
     padding: 8px 6px; border-bottom: 1px solid var(--border);
     text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }
td { padding: 8px 6px; border-bottom: 1px solid var(--border);
     font-variant-numeric: tabular-nums; }
tr:last-child td { border-bottom: none; }
.bar-cell { position: relative; min-width: 80px; }
.bar-cell .bar {
  position: absolute; inset: 4px 0; background: rgba(94,234,212,.12);
  border-radius: 3px; z-index: 0;
}
.bar-cell span { position: relative; z-index: 1; }
.flag { width: 18px; display: inline-block; text-align: center; margin-right: 6px; }
.muted { color: var(--text-dim); }
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 11px; background: rgba(255,255,255,.05); color: var(--text-dim);
}

/* Map */
#mapChart { width: 100%; height: 480px; }
#trendChart { width: 100%; height: 280px; }
.donut { width: 100%; height: 240px; }

/* Loading + login */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--text-dim);
}
.login-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center; z-index: 10;
}
.login-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 32px; min-width: 340px;
}
.login-card h1 { font-size: 20px; margin-bottom: 6px; }
.login-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
.login-card input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 6px;
  font-size: 14px; margin-bottom: 12px;
}
.login-card input:focus { border-color: var(--accent); outline: none; }
.login-card button.primary {
  width: 100%; background: var(--accent); color: #051218;
  border: none; padding: 10px; border-radius: 6px;
  font-weight: 600; font-size: 14px; margin-top: 8px;
}
.error { color: var(--danger); font-size: 13px; margin-top: 4px; min-height: 18px; }

/* Live feed */
.feed { max-height: 360px; overflow-y: auto; }
.feed::-webkit-scrollbar { width: 6px; }
.feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 1100px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .row.two, .row.three { grid-template-columns: 1fr; }
  #mapChart { height: 360px; }
}
</style>
</head>
<body>

<!-- Login overlay -->
<div id="loginModal" class="login-modal" style="display:none">
  <div class="login-card">
    <h1>Tonel Analytics</h1>
    <p>登录后查看 tonel.io 的访问数据。</p>
    <input id="loginUser" type="text" placeholder="用户名" autocomplete="username" />
    <input id="loginPass" type="password" placeholder="密码" autocomplete="current-password" />
    <div id="loginError" class="error"></div>
    <button class="primary" id="loginBtn">登录</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <header class="top">
    <div class="brand">
      <span class="dot"></span>
      <span>Tonel Analytics</span>
      <span class="sub" id="brandSub">tonel.io · 后端可视化</span>
    </div>
    <div class="controls">
      <button class="range-btn" data-range="24h">24小时</button>
      <button class="range-btn active" data-range="7d">7天</button>
      <button class="range-btn" data-range="30d">30天</button>
      <button class="range-btn" data-range="all">全部</button>
      <button class="refresh-btn" id="refreshBtn">刷新</button>
      <button class="logout-btn" id="logoutBtn">退出</button>
    </div>
  </header>

  <main>
    <!-- KPI strip -->
    <section class="kpis">
      <div class="kpi"><div class="label">总访问量</div>
        <div class="value" id="kpiVisits">—</div>
        <div class="delta" id="kpiVisitsDelta">所选时间范围内</div></div>
      <div class="kpi"><div class="label">独立 IP</div>
        <div class="value" id="kpiUniques">—</div>
        <div class="delta">基于 IP 哈希去重</div></div>
      <div class="kpi"><div class="label">国家/地区</div>
        <div class="value" id="kpiCountries">—</div>
        <div class="delta">访客覆盖范围</div></div>
      <div class="kpi"><div class="label">最近 24 小时</div>
        <div class="value" id="kpi24h">—</div>
        <div class="delta">实时窗口</div></div>
    </section>

    <!-- Map + Top countries -->
    <section class="row two">
      <div class="panel">
        <h2>访问来源 · 世界地图
          <span class="hint">圆点大小 = 访问量；点击放大查看</span></h2>
        <div id="mapChart"></div>
      </div>
      <div class="panel">
        <h2>Top 国家或地区</h2>
        <table>
          <thead><tr><th></th><th>国家或地区</th><th style="text-align:right">访问</th><th style="text-align:right">独立 IP</th></tr></thead>
          <tbody id="topCountries"><tr><td colspan="4" class="muted">加载中…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Trend line chart -->
    <section class="panel">
      <h2>访问趋势 <span class="hint" id="trendBucketHint"></span></h2>
      <div id="trendChart"></div>
    </section>

    <!-- Devices, Browsers, OS -->
    <section class="row three">
      <div class="panel">
        <h2>设备分布</h2>
        <div id="deviceChart" class="donut"></div>
      </div>
      <div class="panel">
        <h2>浏览器</h2>
        <div id="browserChart" class="donut"></div>
      </div>
      <div class="panel">
        <h2>操作系统</h2>
        <div id="osChart" class="donut"></div>
      </div>
    </section>

    <!-- Top cities + Recent feed -->
    <section class="row two">
      <div class="panel">
        <h2>Top 城市</h2>
        <table>
          <thead><tr><th>城市</th><th>国家或地区</th><th style="text-align:right">访问</th></tr></thead>
          <tbody id="topCities"><tr><td colspan="3" class="muted">加载中…</td></tr></tbody>
        </table>
      </div>
      <div class="panel">
        <h2>实时访客 <span class="hint">最近 50 条</span></h2>
        <div class="feed">
          <table>
            <thead><tr><th>时间</th><th>IP</th><th>位置</th><th>路径</th><th>设备</th></tr></thead>
            <tbody id="recentFeed"><tr><td colspan="5" class="muted">加载中…</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- ECharts core. World GeoJSON is loaded + registered at runtime below.
     Multi-source loader: jsdelivr → bootcdn (China-friendly) → unpkg.
     If all fail (offline / firewall), shows a helpful error message. -->
<script>
(function () {
  var sources = [
    'https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js',
    'https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js',
    'https://unpkg.com/echarts@5.5.0/dist/echarts.min.js',
  ];
  var i = 0;
  function tryNext() {
    if (i >= sources.length) {
      document.body.innerHTML = '<div style="padding:40px;color:#ef4444;font-family:sans-serif;background:#0b0e14;color:#e6edf3;min-height:100vh">'
        + '<h2 style="color:#ef4444">无法加载 ECharts</h2>'
        + '<p>所有 CDN 源都失败（jsdelivr / bootcdn / unpkg）。检查一下网络，或者把 echarts.min.js 下到 public/admin/ 用本地路径。</p></div>';
      return;
    }
    var s = document.createElement('script');
    s.src = sources[i++];
    s.onload = function () {
      console.log('[echarts] loaded from', s.src);
      var ev = document.createEvent('Event');
      ev.initEvent('echarts-ready', true, true);
      document.dispatchEvent(ev);
    };
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
// ───────────────────────────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────────────────────────
const API = ''; // same-origin; analytics service serves both /admin and /api
let TOKEN = localStorage.getItem('tonel_an_token') || '';
let RANGE = '7d';
let charts = {}; // ECharts instances

// ─── Auth ──────────────────────────────────────────────────────────────────
function showLogin(msg = '') {
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginError').textContent = msg;
}
function showApp() {
  document.getElementById('loginModal').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent = '';
  try {
    const r = await fetch(API + '/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) { showLogin(data.error || '登录失败'); return; }
    TOKEN = data.token;
    localStorage.setItem('tonel_an_token', TOKEN);
    showApp();
    initCharts();
    refreshAll();
  } catch (e) {
    showLogin('网络错误：' + e.message);
  }
}

function logout() {
  localStorage.removeItem('tonel_an_token');
  TOKEN = '';
  showLogin();
}

async function api(path) {
  const r = await fetch(API + path + (path.includes('?') ? '&' : '?') + 'range=' + RANGE,
    { headers: { 'Authorization': 'Bearer ' + TOKEN } });
  if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

// ─── Charts ────────────────────────────────────────────────────────────────
// World map state. registerWorldMap() resolves once any of the CDN sources
// returns a usable GeoJSON. Until then the map shows a "loading" placeholder
// and other charts render normally.
let worldMapReady = false;

const WORLD_GEOJSON_URLS = [
  // Primary: ECharts 4's bundled world.json (still hosted on jsdelivr).
  'https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/world.json',
  // Mirror via unpkg.
  'https://unpkg.com/echarts@4.9.0/map/json/world.json',
  // Backup: a canonical natural-earth GeoJSON.
  'https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json',
];

async function registerWorldMap() {
  for (const url of WORLD_GEOJSON_URLS) {
    try {
      const r = await fetch(url, { cache: 'force-cache' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const geo = await r.json();
      echarts.registerMap('world', geo);
      worldMapReady = true;
      console.log('[map] loaded from', url);
      return;
    } catch (e) {
      console.warn('[map] failed', url, e.message);
    }
  }
  // All sources failed — show a hint in the panel header.
  document.querySelector('.panel h2 .hint').textContent =
    '⚠ 地图底图加载失败（CDN 不可达），仅显示散点';
}

function initCharts() {
  if (charts.map) return;          // idempotent — login + boot may both call
  // renderer:'canvas' (default) is faster than svg for the 100s of points
  // and country fills we draw. devicePixelRatio is capped at 2 because
  // 3x retina screens otherwise allocate a 9x larger canvas backing store
  // and turn pan/zoom into a slideshow.
  const opts = { renderer: 'canvas', devicePixelRatio: Math.min(2, window.devicePixelRatio || 1) };
  charts.map     = echarts.init(document.getElementById('mapChart'),     'dark', opts);
  charts.trend   = echarts.init(document.getElementById('trendChart'),   'dark', opts);
  charts.device  = echarts.init(document.getElementById('deviceChart'),  'dark', opts);
  charts.browser = echarts.init(document.getElementById('browserChart'), 'dark', opts);
  charts.os      = echarts.init(document.getElementById('osChart'),      'dark', opts);
  window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
  // While the world GeoJSON downloads, show a friendly placeholder.
  charts.map.showLoading('default', {
    text: '加载世界地图…', color: '#5eead4',
    textColor: '#8b95a7', maskColor: 'rgba(0,0,0,0)',
  });
  // Kick off the world map registration in parallel with the first
  // /api/dashboard/* fetches. When it resolves, re-render the map with
  // the cached payload (no extra network round-trip).
  registerWorldMap().then(() => {
    if (_lastGeo && _lastCountries) renderMap(_lastGeo, _lastCountries);
  });
}

function renderMap(points, countries) {
  charts.map.hideLoading();
  const maxByCountry = {};
  countries.forEach(c => { maxByCountry[c.country_code] = c.visits; });

  // Performance notes:
  //  - shadowBlur on scatter points is the single biggest perf killer
  //    (each point becomes a per-frame Gaussian blur on the canvas).
  //    Removed entirely — color alone is enough at this density.
  //  - large=true + largeThreshold=50 switches ECharts to its bulk-draw
  //    code path for scatter (single drawImage per batch).
  //  - animation=false on series + setOption skips the fade-in tween.
  //  - cap symbol size to 24 so a single hot city doesn't paint a giant
  //    circle that pegs a frame.
  const scatterSeries = {
    name: '城市来源',
    type: 'scatter',
    coordinateSystem: 'geo',
    data: points.map(p => ({
      name: (p.city ? p.city + ', ' : '') + (p.country || ''),
      value: [p.lng, p.lat, p.visits],
      uniques: p.uniques,
    })),
    symbolSize: (val) => Math.min(24, 3 + Math.sqrt(val[2]) * 2),
    itemStyle: { color: '#5eead4', opacity: 0.85 },
    large: true,
    largeThreshold: 50,
    animation: false,
    silent: false,         // keep tooltips, just no animations
  };

  // Choropleth (filled-country) layer requires the world map to be
  // registered. If the GeoJSON CDN failed, we still draw a blank world
  // canvas with just the scatter dots — the user can see where visits
  // come from even without the country fills.
  const baseGeo = worldMapReady
    ? {
        map: 'world',
        roam: false,         // panning + zoom disabled per user preference
        itemStyle: { areaColor: '#161b25', borderColor: '#1f2632' },
        emphasis: {
          disabled: true,    // no hover-fill repaint on every region
        },
        regions: [{ name: 'Antarctica', itemStyle: { opacity: 0 } }],
        zoom: 1.2,
        animation: false,
      }
    : {
        roam: false,
        zoom: 1,
        center: [0, 20],
        animation: false,
      };

  const option = {
    backgroundColor: 'transparent',
    animation: false,        // global no-animation
    tooltip: {
      trigger: 'item',
      transitionDuration: 0, // tooltips don't fade — instant or nothing
      formatter: (p) => {
        if (p.componentSubType === 'scatter') {
          return `<b>${p.data.name}</b><br/>访问 ${p.data.value[2]}<br/>独立 IP ${p.data.uniques}`;
        }
        // Map/geo region: only show tooltip for countries that actually have visits.
        // Without this, hovering blank countries shows "访问 0".
        const visits = maxByCountry[p.data?.code];
        if (!visits) return '';
        return `<b>${p.name}</b><br/>访问 ${visits}`;
      },
    },
    geo: baseGeo,
    series: [],
  };

  if (worldMapReady) {
    option.visualMap = {
      show: true,
      min: 0,
      max: Math.max(10, ...countries.map(c => c.visits)),
      left: 16, bottom: 16,
      inRange: { color: ['#1f2937', '#0e7490', '#5eead4'] },
      text: ['多', '少'],
      textStyle: { color: '#8b95a7' },
      calculable: true,
      seriesIndex: 0,    // only the choropleth series, not the scatter
    };
    option.series.push({
      name: '国家访问量',
      type: 'map',
      geoIndex: 0,
      animation: false,
      // ECharts world map uses English country names; geoip-lite gives
      // ISO codes. ISO_TO_NAME (bottom of file) maps the common ones;
      // unmatched countries don't fill but values still appear in tooltips.
      data: countries.map(c => ({
        name: ISO_TO_NAME[c.country_code] || c.country_code,
        value: c.visits,
        code: c.country_code,
      })),
    });
  }

  option.series.push(scatterSeries);
  // notMerge=true so we wipe any old visualMap when re-rendering after
  // the world map finishes loading. lazyUpdate=true defers the actual
  // canvas paint to the next frame, which lets the browser yield to UI
  // events between fetch-and-paint.
  charts.map.setOption(option, { notMerge: true, lazyUpdate: true });
}

function renderTrend(payload) {
  const points = payload.points || [];
  const isHour = payload.bucket_seconds === 3600;
  document.getElementById('trendBucketHint').textContent =
    isHour ? '· 按小时聚合' : '· 按天聚合';

  charts.trend.setOption({
    backgroundColor: 'transparent',
    grid: { left: 50, right: 16, top: 30, bottom: 40 },
    tooltip: { trigger: 'axis', backgroundColor: '#11151d', borderColor: '#1f2632',
               textStyle: { color: '#e6edf3' } },
    legend: { textStyle: { color: '#8b95a7' }, top: 0, right: 16 },
    xAxis: {
      type: 'category',
      data: points.map(p => isHour
        ? new Date(p.t * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        : p.iso.slice(5, 10)),
      axisLine: { lineStyle: { color: '#1f2632' } },
      axisLabel: { color: '#8b95a7' },
    },
    yAxis: {
      type: 'value',
      axisLine: { show: false },
      splitLine: { lineStyle: { color: '#1f2632' } },
      axisLabel: { color: '#8b95a7' },
    },
    series: [
      { name: '访问量', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5,
        itemStyle: { color: '#5eead4' },
        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [{ offset: 0, color: 'rgba(94,234,212,.35)' },
                       { offset: 1, color: 'rgba(94,234,212,0)' }] } },
        data: points.map(p => p.visits) },
      { name: '独立 IP', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5,
        itemStyle: { color: '#818cf8' },
        data: points.map(p => p.uniques) },
    ],
  });
}

function renderDonut(chart, items, palette) {
  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'item', formatter: '{b}<br/>{c} ({d}%)' },
    legend: { bottom: 0, textStyle: { color: '#8b95a7' }, type: 'scroll' },
    series: [{
      type: 'pie', radius: ['50%', '72%'], center: ['50%', '45%'],
      avoidLabelOverlap: true,
      itemStyle: { borderColor: '#11151d', borderWidth: 2 },
      label: { show: false },
      labelLine: { show: false },
      data: items.map((d, i) => ({
        name: d.name || '(unknown)',
        value: d.value,
        itemStyle: { color: palette[i % palette.length] },
      })),
    }],
  });
}

// ─── Tables ────────────────────────────────────────────────────────────────
function flag(code) {
  if (!code || code.length !== 2) return '🌐';
  return code.toUpperCase().replace(/./g, c =>
    String.fromCodePoint(127397 + c.charCodeAt(0)));
}

function renderCountriesTable(countries) {
  const max = Math.max(1, ...countries.map(c => c.visits));
  const rows = countries.slice(0, 10).map(c => `
    <tr>
      <td><span class="flag">${flag(c.country_code)}</span></td>
      <td>${c.country || c.country_code || '—'}</td>
      <td class="bar-cell" style="text-align:right">
        <div class="bar" style="width:${(c.visits / max * 100).toFixed(1)}%"></div>
        <span>${c.visits.toLocaleString()}</span></td>
      <td style="text-align:right" class="muted">${c.uniques.toLocaleString()}</td>
    </tr>`).join('');
  document.getElementById('topCountries').innerHTML = rows ||
    '<tr><td colspan="4" class="muted">暂无数据 — 接入 tracker 后会出现访问</td></tr>';
}

function renderCitiesTable(cities) {
  const rows = cities.slice(0, 12).map(c => `
    <tr>
      <td>${c.city || '—'}</td>
      <td><span class="flag">${flag(c.country_code)}</span> ${c.country || ''}</td>
      <td style="text-align:right">${c.visits.toLocaleString()}</td>
    </tr>`).join('');
  document.getElementById('topCities').innerHTML = rows ||
    '<tr><td colspan="3" class="muted">暂无数据</td></tr>';
}

function renderRecent(rows) {
  const html = rows.map(r => {
    const t = new Date(r.ts * 1000);
    const ago = humanAgo(t);
    const dev = `<span class="tag">${r.device || '?'}</span>`;
    const loc = [r.country, r.city].filter(Boolean).join(' · ') || '—';
    return `<tr>
      <td class="muted" title="${t.toISOString()}">${ago}</td>
      <td class="muted">${r.ip || '—'}</td>
      <td>${loc}</td>
      <td class="muted">${(r.path || '/').slice(0, 32)}</td>
      <td>${dev}</td>
    </tr>`;
  }).join('');
  document.getElementById('recentFeed').innerHTML = html ||
    '<tr><td colspan="5" class="muted">暂无访问记录</td></tr>';
}

function humanAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + ' 秒前';
  if (s < 3600) return Math.floor(s / 60) + ' 分前';
  if (s < 86400) return Math.floor(s / 3600) + ' 小时前';
  return Math.floor(s / 86400) + ' 天前';
}

// ─── Refresh ───────────────────────────────────────────────────────────────
async function refreshAll() {
  try {
    const [summary, trend, geo, countries, cities, devices, recent] =
      await Promise.all([
        api('/api/dashboard/summary'),
        api('/api/dashboard/trend'),
        api('/api/dashboard/geo'),
        api('/api/dashboard/countries'),
        api('/api/dashboard/cities'),
        api('/api/dashboard/devices'),
        api('/api/dashboard/recent'),
      ]);

    document.getElementById('kpiVisits').textContent    = summary.visits.toLocaleString();
    document.getElementById('kpiUniques').textContent   = summary.uniques.toLocaleString();
    document.getElementById('kpiCountries').textContent = summary.countries.toLocaleString();
    document.getElementById('kpi24h').textContent       = summary.visits_24h.toLocaleString();

    renderMap(geo.points, countries.countries);
    renderTrend(trend);
    renderCountriesTable(countries.countries);
    renderCitiesTable(cities.cities);
    renderDonut(charts.device,  devices.devices,  ['#5eead4','#818cf8','#f59e0b','#ef4444']);
    renderDonut(charts.browser, devices.browsers, ['#5eead4','#818cf8','#22c55e','#f59e0b','#ef4444','#a855f7']);
    renderDonut(charts.os,      devices.os,       ['#818cf8','#5eead4','#22c55e','#f59e0b','#ef4444','#a855f7']);
    renderRecent(recent.recent);
  } catch (e) {
    console.error(e);
  }
}

// ─── Event wiring ──────────────────────────────────────────────────────────
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    RANGE = btn.dataset.range;
    refreshAll();
  });
});
document.getElementById('refreshBtn').addEventListener('click', refreshAll);
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

// Auto-refresh every 30s while the tab is visible.
setInterval(() => { if (TOKEN && document.visibilityState === 'visible') refreshAll(); }, 30000);

// ─── Boot ──────────────────────────────────────────────────────────────────
// Cache the latest geo + countries payloads so initCharts can re-render
// the map once the world GeoJSON finishes loading, without re-fetching.
let _lastGeo = null, _lastCountries = null;
const _origRenderMap = renderMap;
renderMap = function (points, countries) {
  _lastGeo = points; _lastCountries = countries;
  _origRenderMap(points, countries);
};

// ECharts is loaded asynchronously by the loader script above. Defer the
// boot path that calls initCharts() until echarts is on window — otherwise
// `echarts.init` throws ReferenceError, the rest of this script never
// executes, and any const declared below stays in TDZ (renderMap fails).
function bootApp() {
  if (TOKEN) {
    showApp();
    initCharts();
    refreshAll();
  } else {
    showLogin();
  }
}
if (typeof echarts !== 'undefined') bootApp();
else document.addEventListener('echarts-ready', bootApp, { once: true });
