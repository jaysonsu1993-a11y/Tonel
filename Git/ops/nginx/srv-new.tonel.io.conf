# srv-new.tonel.io — fallback mixer entry (v5.0.0+, `/new` path traffic).
#
# DNS: A record → 8.163.21.207 (Aliyun, grey cloud / DNS only).
# Backs the `/new` URL path, which the web client wires to the
# fallback signaling + mixer. AppKit desktop clients are NOT here
# (they hardcode the IP 8.163.21.207 directly, sidestepping nginx).
#
# v5.0.0 cutover note: the cert for srv-new.tonel.io on Aliyun was
# COPIED from the new server's /etc/letsencrypt/live/srv-new.tonel.io/
# (the cert was originally issued there during the /new test deploy).
# Aliyun's cloud WAF (`Server: Beaver` header) intercepts HTTP-01
# challenges for new hostnames at port 80, blocking the standard
# certbot --nginx flow. Renewal before 2026-07-29 must use DNS-01
# via Cloudflare API. See Git/deploy/README.md "Cert renewal" section.

server {
    listen 443 ssl;
    server_name srv-new.tonel.io;

    ssl_certificate     /etc/letsencrypt/live/srv-new.tonel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv-new.tonel.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CRITICAL: binary WebSocket frames must not be buffered/truncated.
    proxy_buffering off;
    proxy_request_buffering off;

    location /mixer-tcp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /mixer-udp {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 80;
    server_name srv-new.tonel.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
