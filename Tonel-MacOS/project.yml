name: TonelMacOS
options:
  bundleIdPrefix: io.tonel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: io.tonel.macos
    MARKETING_VERSION: "0.1.10"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TonelMacOS:
    type: application
    platform: macOS
    sources:
      - path: TonelMacOS
        excludes:
          - "Resources/Info.plist"
    resources:
      - TonelMacOS/Resources
    info:
      path: TonelMacOS/Resources/Info.plist
      properties:
        # Without `NSMicrophoneUsageDescription` in the actual Info.plist
        # bundle, calling `AVCaptureDevice.requestAccess(for: .audio)`
        # under the sandbox triggers TCC's
        # `__TCC_CRASHING_DUE_TO_PRIVACY_VIOLATION__` and the app gets
        # SIGABRT'd before AudioEngine.start() can produce a single log
        # line — the symptom the user reported as "alone in room: can't
        # hear self." The `INFOPLIST_KEY_NSMicrophoneUsageDescription`
        # build setting below only takes effect with auto-generated
        # plists (`GENERATE_INFOPLIST_FILE=YES`); we ship a manual
        # plist, so the setting was a no-op. Putting the key here gets
        # xcodegen to merge it into the manual plist on every
        # `xcodegen generate`.
        NSMicrophoneUsageDescription: "Tonel 需要麦克风权限把你的声音送进排练房间。"
        NSHumanReadableCopyright: "© 2026 Tonel"
        LSApplicationCategoryType: "public.app-category.music"
    entitlements:
      path: TonelMacOS/Resources/TonelMacOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
