name: TonelMacOS
options:
  bundleIdPrefix: io.tonel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: io.tonel.macos
    MARKETING_VERSION: "0.1.11"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TonelMacOS:
    type: application
    platform: macOS
    sources:
      - path: TonelMacOS
        excludes:
          - "Resources/Info.plist"
    resources:
      - TonelMacOS/Resources
    info:
      path: TonelMacOS/Resources/Info.plist
      properties:
        # macOS privacy enforcement: without NSMicrophoneUsageDescription
        # the OS sends SIGABRT the moment we touch AVCaptureDevice. Putting
        # it in `info.properties` (rather than relying on
        # INFOPLIST_KEY_NSMicrophoneUsageDescription) makes xcodegen write
        # it directly into the Info.plist file — survives `xcodegen
        # generate` re-runs, which otherwise erase any keys we don't list
        # here. (v6.1.0 regression: the regen on adding MixerTransport.swift
        # silently dropped this key, app crashed on first 创建 click.)
        NSMicrophoneUsageDescription: "Tonel needs microphone access to send your audio to the rehearsal room."
        NSHumanReadableCopyright: "© 2026 Tonel"
        LSApplicationCategoryType: "public.app-category.music"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        CFBundleDisplayName: "Tonel"
        NSHighResolutionCapable: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: TonelMacOS/Resources/TonelMacOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Tonel needs microphone access to send your audio to the rehearsal room."
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Tonel"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
